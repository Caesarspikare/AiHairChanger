<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Hair Changer (Offline Fix)</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0d0b09;
color:#fff;
}

header{
padding:20px;
text-align:center;
font-size:20px;
font-weight:bold;
background:#161310;
border-bottom:1px solid #333;
}

.container{
max-width:1000px;
margin:0 auto;
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.box{
background:#1e1a16;
padding:15px;
border:1px solid #333;
border-radius:10px;
}

.upload{
border:2px dashed #555;
padding:20px;
text-align:center;
cursor:pointer;
}

.upload input{
display:none;
}

img{
width:100%;
border-radius:10px;
display:block;
}

.photoWrap{
position:relative;
}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

button{
margin-top:10px;
padding:10px;
border:none;
cursor:pointer;
border-radius:6px;
background:#c9a96e;
color:#000;
font-weight:bold;
}

.styles{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.style{
padding:8px 12px;
background:#2a241f;
border:1px solid #444;
cursor:pointer;
border-radius:20px;
font-size:12px;
}

.style:hover{
border-color:#c9a96e;
}

.status{
margin-top:10px;
font-size:12px;
color:#aaa;
}

</style>
</head>

<body>

<header>AI Hair Changer — Offline Realistic Version</header>

<div class="container">

<!-- LEFT -->
<div class="box">

<label class="upload">
<input type="file" id="fileInput" accept="image/*">
📸 Klicka eller dra in bild
</label>

<div class="photoWrap" id="photoWrap" style="display:none;">
<img id="photo">
<canvas id="canvas"></canvas>
</div>

<button onclick="reset()">Byt bild</button>

<div class="status" id="status">Ladda upp en bild först</div>

</div>

<!-- RIGHT -->
<div class="box">

<h3>Frisyrer</h3>

<div class="styles">
<div class="style" onclick="setHair('long')">Långt hår</div>
<div class="style" onclick="setHair('bob')">Bob</div>
<div class="style" onclick="setHair('waves')">Vågor</div>
<div class="style" onclick="setHair('bun')">Uppsatt</div>
<div class="style" onclick="setHair('pixie')">Pixie</div>
</div>

</div>

</div>

<script>

let imgEl = document.getElementById("photo");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let selectedHair = null;

// upload
document.getElementById("fileInput").onchange = function(e){
const file = e.target.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = function(ev){
imgEl.src = ev.target.result;

document.getElementById("photoWrap").style.display = "block";

document.getElementById("status").innerText = "Bild laddad ✔";
};

reader.readAsDataURL(file);
};

// resize canvas korrekt
function resize(){
canvas.width = imgEl.clientWidth;
canvas.height = imgEl.clientHeight;
}

// hair selector
function setHair(type){
selectedHair = type;
drawHair();
}

// reset
function reset(){
location.reload();
}

// REALISTISK HAIR SIMULATION
function drawHair(){

if(!imgEl.src) return;

resize();
ctx.clearRect(0,0,canvas.width,canvas.height);

let baseColor = "#3b2a1a";

if(selectedHair === "bob") baseColor = "#5a3a22";
if(selectedHair === "waves") baseColor = "#c9a96e";
if(selectedHair === "bun") baseColor = "#2c1b12";
if(selectedHair === "pixie") baseColor = "#1a0f0a";

// mjuk “hårmassa”
ctx.globalAlpha = 0.25;
ctx.fillStyle = baseColor;

ctx.beginPath();
ctx.ellipse(
canvas.width/2,
canvas.height*0.25,
canvas.width*0.45,
canvas.height*0.3,
0,0,Math.PI*2
);
ctx.fill();

// hårstrån (realism)
ctx.globalAlpha = 0.08;

for(let i=0;i<120;i++){

let x = Math.random()*canvas.width;
let y = Math.random()*canvas.height*0.5;

let len = 40 + Math.random()*120;

ctx.strokeStyle = baseColor;
ctx.lineWidth = 1 + Math.random()*2;

ctx.beginPath();
ctx.moveTo(x,y);

ctx.bezierCurveTo(
x + Math.random()*30,
y + len/2,
x - Math.random()*30,
y + len,
x,
y + len
);

ctx.stroke();
}

ctx.globalAlpha = 1;

document.getElementById("status").innerText =
"Frisyr applicerad: " + selectedHair;

}

// fix resize on load
imgEl.onload = function(){
resize();
drawHair();
};

window.onresize = resize;

</script>

</body>
</html>
