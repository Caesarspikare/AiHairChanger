<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV AI - Skapa ditt CV</title>
  <style>
    :root { --accent: #00ff9d; --bg: #0a0a0a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: #ddd;
      display: flex;
      min-height: 100vh;
    }
    .form {
      width: 420px;
      background: #111118;
      padding: 30px;
      overflow-y: auto;
      border-right: 1px solid #222;
    }
    .preview {
      flex: 1;
      padding: 40px;
      background: #f4f4f4;
      color: #111;
      overflow-y: auto;
    }
    h1 { color: var(--accent); }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #1f1f2e;
      border: 1px solid #444;
      border-radius: 8px;
      color: white;
    }
    button {
      background: var(--accent);
      color: black;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      width: 100%;
      margin-top: 15px;
      cursor: pointer;
    }
    .cv {
      max-width: 750px;
      margin: 0 auto;
      background: white;
      padding: 50px 60px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .cv h1 { text-align: center; font-size: 2.6rem; }
    .cv h2 { border-bottom: 3px solid var(--accent); padding-bottom: 8px; margin: 25px 0 12px; }
  </style>
</head>
<body>

  <div class="form">
    <h1>CV AI</h1>
    <p>Fyll i dina uppgifter nedan</p>

    <input type="text" id="namn" placeholder="Fullständigt namn" onkeyup="updateCV()">
    <input type="text" id="titel" placeholder="Titel (t.ex. Webbutvecklare)" onkeyup="updateCV()">
    <input type="text" id="email" placeholder="E-post" onkeyup="updateCV()">
    <input type="text" id="telefon" placeholder="Telefon" onkeyup="updateCV()">
    <input type="text" id="ort" placeholder="Ort" onkeyup="updateCV()">

    <textarea id="utbildning" rows="5" placeholder="Utbildning..." onkeyup="updateCV()"></textarea>
    <textarea id="erfarenhet" rows="6" placeholder="Arbetslivserfarenhet..." onkeyup="updateCV()"></textarea>
    <textarea id="fardigheter" rows="3" placeholder="Färdigheter (separera med komma)" onkeyup="updateCV()"></textarea>

    <button onclick="window.print()">Ladda ner / Skriv ut CV</button>
  </div>

  <div class="preview">
    <div id="cv" class="cv">
      <h1>Ditt Namn</h1>
      <p style="text-align:center; font-size:1.3rem;">Din titel här</p>
      <p style="text-align:center;">e-post • telefon • ort</p>
      
      <h2>Utbildning</h2>
      <p>Fyll i vänster sida...</p>
      
      <h2>Arbetslivserfarenhet</h2>
      <p>Fyll i vänster sida...</p>
      
      <h2>Färdigheter</h2>
      <p>Fyll i vänster sida...</p>
    </div>
  </div>

  <script>
    function updateCV() {
      document.querySelector("#cv h1").textContent = document.getElementById("namn").value || "Ditt Namn";
      document.querySelector("#cv p").textContent = document.getElementById("titel").value || "Din titel";
      
      const kontakt = `${document.getElementById("email").value || ""} • ${document.getElementById("telefon").value || ""} • ${document.getElementById("ort").value || ""}`;
      document.querySelectorAll("#cv p")[1].textContent = kontakt;

      // Utbildning
      const utbildningText = document.getElementById("utbildning").value.replace(/\n/g, "<br>");
      const expText = document.getElementById("erfarenhet").value.replace(/\n/g, "<br>");
      const skillsText = document.getElementById("fardigheter").value;

      const sections = document.querySelectorAll("#cv h2");
      if (sections[0]) sections[0].nextElementSibling.innerHTML = utbildningText || "Fyll i utbildning...";
      if (sections[1]) sections[1].nextElementSibling.innerHTML = expText || "Fyll i erfarenhet...";
      if (sections[2]) sections[2].nextElementSibling.innerHTML = skillsText || "Fyll i färdigheter...";
    }
  </script>
</body>
</html>
