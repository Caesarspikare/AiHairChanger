<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekenved - Fjällboende</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    color: #333;
}

header {
    background: #2c3e50;
    color: white;
    text-align: center;
    padding: 40px 20px;
}

nav {
    background: #34495e;
    text-align: center;
    padding: 10px;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    text-decoration: underline;
}

#hero img {
    width: 100%;
    height: 400px;
    object-fit: cover;
}

section {
    padding: 40px 20px;
    max-width: 1000px;
    margin: auto;
}

h2 {
    margin-bottom: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.grid img {
    width: 100%;
    border-radius: 10px;
}

footer {
    background: #2c3e50;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>

</head>
<body>

<header>
    <h1>Ekenved</h1>
    <p>Naturnära boende i Storfjäten, Idre</p>
</header>

<nav>
    <a href="#about">Om</a>
    <a href="#gallery">Bilder</a>
    <a href="#contact">Kontakt</a>
</nav>

<section id="hero">
    <img src="images/bild1.jpg" alt="Fjällbild">
</section>

<section id="about">
    <h2>Om boendet</h2>
    <p>
        Upplev lugnet i fjällen med närhet till natur, skidåkning och vandring.
        Perfekt för både vinter- och sommarsemester.
    </p>
</section>

<section id="gallery">
    <h2>Bilder</h2>
    <div class="grid">
        <img src="images/bild1.jpg" alt="">
        <img src="images/bild2.jpg" alt="">
        <img src="images/bild3.jpg" alt="">
    </div>
</section>

<section id="contact">
    <h2>Kontakt</h2>
    <p>Email: info@ekenved.se</p>
</section>

<footer>
    <p>© 2026 Ekenved</p>
</footer>

</body>
</html>
